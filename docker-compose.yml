name: p2p-rag-project
services:
  backend:
    container_name: p2p-rag-project
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: p2p-rag-project-backend:latest
    ports:
      - "127.0.0.1:8000:8000"
    env_file:
      - ./backend/.env
    environment:
      HF_HOME: /app/models
    volumes:
      - models_data:/app/models
      - ./uploads:/app/uploads
    depends_on:
      qdrant:
        condition: service_started
      redis:
        condition: service_healthy
    restart: unless-stopped

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: p2p-rag-project-backend:latest
    command: arq app.workers.ingestion_worker.WorkerSettings
    env_file:
      - ./backend/.env
    environment:
      HF_HOME: /app/models
    volumes:
      - models_data:/app/models
      - ./uploads:/app/uploads
    depends_on:
      backend:
        condition: service_started
      qdrant:
        condition: service_started
      redis:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  models_data:
