name: p2p-rag-project
services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: p2p-rag-project-backend:latest
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      HF_HOME: /app/models
    volumes:
      - ./backend:/app
      - uploads_data:/app/uploads
      - models_data:/app/models
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    depends_on:
      qdrant:
        condition: service_started
      redis:
        condition: service_healthy

  worker:
    image: p2p-rag-project-backend:latest
    command: arq app.workers.ingestion_worker.WorkerSettings
    env_file:
      - ./backend/.env
    environment:
      HF_HOME: /app/models
    volumes:
      - ./backend:/app
      - uploads_data:/app/uploads
      - models_data:/app/models
    depends_on:
      backend:
        condition: service_started
      qdrant:
        condition: service_started
      redis:
        condition: service_healthy

  frontend:
    image: node:20-alpine
    working_dir: /app
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: sh -c "npm install && npm run dev"
    depends_on:
      - backend

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:6333/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  uploads_data:
  models_data:
  qdrant_data:
  redis_data:
